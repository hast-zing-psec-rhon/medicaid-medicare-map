name: Secret Scan (TruffleHog)

on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog (verified secrets only)
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:3.93.6 git "file:///repo" --results=verified --fail --no-update
